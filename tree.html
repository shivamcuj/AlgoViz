<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AlgoViz — interactive binary tree builder and algorithm visualizer">

    <link rel="icon" type="image/x-icon" href="/Assets/images/AlgoVizLogo.ico">
    <title>AlgoViz</title>

    <!-- stylesheets -->
    <link rel="stylesheet" href="Workers/Atlas/atlas.css">
</head>

<body>

    <div class="ui-container">

        <div class="canvas-container">

            <!-- canvas wrapper provides border + glow + absolute controls -->
            <div class="canvas-wrapper">
                <canvas id="atlas-canvas"></canvas>

                <!-- bottom-right controls bar -->
                <div class="atlas-controls">

                    <!-- Algorithm selector -->
                    <div class="atlas-algo-selector" style="display: none;">
                        <label for="atlas-algo-select" class="atlas-algo-label">Algorithm</label>
                        <div class="atlas-select-wrapper">
                            <select id="atlas-algo-select">
                                <optgroup label="Breadth-First">
                                    <option value="bfs">BFS — Level Order</option>
                                </optgroup>
                                <optgroup label="Depth-First">
                                    <option value="dfs-inorder">DFS — In-order</option>
                                    <option value="dfs-preorder">DFS — Pre-order</option>
                                    <option value="dfs-postorder">DFS — Post-order</option>
                                </optgroup>
                            </select>
                            <span class="atlas-select-arrow">▾</span>
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                        <button id="atlas-build-btn" style="display: none; padding: 0.35rem 1rem; font-size: 0.75rem;">Build Tree</button>
                        <button id="atlas-submit-btn">Submit Tree</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="logger-container">
            <div class="bst-log-header">
                <span class="bst-log-title">Activity Log</span>
                <div class="bst-log-controls">
                    <span class="bst-log-badge" id="bst-log-count">0</span>
                    <button id="bst-log-clear" class="bst-log-clear-btn">Clear</button>
                </div>
            </div>
            <div id="bst-log-area"></div>
        </div>

    </div>


    <!-- Atlas worker (load order matters) -->
    <script src="Workers/Atlas/state.js"></script>
    <script src="Workers/Atlas/layout.js"></script>
    <script src="Workers/Atlas/renderer.js"></script>
    <script src="Workers/Atlas/input.js"></script>
    <script src="Workers/Atlas/atlas.js"></script>

    <!-- Solver — Traversal algorithms -->
    <script src="Workers/Solver/Traversal/bfs_levelorder.js"></script>
    <script src="Workers/Solver/Traversal/dfs_inorder.js"></script>
    <script src="Workers/Solver/Traversal/dfs_preorder.js"></script>
    <script src="Workers/Solver/Traversal/dfs_postorder.js"></script>

    <!-- Solver — Delete -->
    <script src="Workers/Solver/Delete/delete.js"></script>

    <!-- Solver — Insert -->
    <script src="Workers/Solver/Insert/insert.js"></script>

    <!-- other worker stubs -->

    <script src="Workers/Solver/test.js"></script>

    <!-- BST Logger -->
    <script src="Workers/BSTlogger.js"></script>

    <!-- visual scripts -->
    <script src="Visual/Logger/test.js"></script>
    <script src="Visual/Echo/test.js"></script>

</body>

</html>
